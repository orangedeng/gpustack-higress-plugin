name: Build and Push to Main

on:
  push:
    branches:
      - main

env:
  # Override via Settings → Variables → DOCKER_REPO (e.g. "myuser" for testing)
  DOCKER_REPO: ${{ vars.DOCKER_REPO || 'gpustack' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # uv.lock is required by the Dockerfile COPY step.
      # Generate it here since it is not committed to git.
      - name: Generate uv.lock
        run: pip install uv && uv lock

      # ========== Build and Push Docker Image ==========
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.CI_DOCKERHUB_USERNAME }}
          password: ${{ secrets.CI_DOCKERHUB_PASSWORD }}

      # Build whl + sdist via Dockerfile whl-output stage (amd64 only, WASM is arch-independent).
      # This includes remote OCI plugins fetched via oras mount.
      # GHA cache is primed here for the image build below.
      - name: Build wheel via Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          target: whl-output
          outputs: type=local,dest=./dist
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gpustack-higress-plugins-dist
          path: dist/
          retention-days: 7

      # Build and push multi-platform Docker image.
      # Reuses layers cached by the whl build above.
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.DOCKER_REPO }}/higress-plugins:latest
            ${{ env.DOCKER_REPO }}/higress-plugins:main
          cache-from: type=gha
          cache-to: type=gha,mode=max
